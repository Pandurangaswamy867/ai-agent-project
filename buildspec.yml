version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
      nodejs: 20
    commands:
      - echo "Installing frontend dependencies"
      - cd frontend
      - npm ci
      - cd ..

  pre_build:
    commands:
      - echo "Building frontend"
      - cd frontend
      - npm run build
      - cd ..

  build:
    commands:
      - echo "Preparing Elastic Beanstalk deployment bundle"
      - rm -rf deploy_bundle
      - mkdir -p deploy_bundle

      - echo "Copying backend files"
      - cp -r backend/* deploy_bundle/

      - echo "Copying built frontend files"
      - mkdir -p deploy_bundle/frontend_dist
      - cp -r frontend/dist/* deploy_bundle/frontend_dist/

      - echo "Creating Procfile"
      - printf 'web: uvicorn main:app --host 0.0.0.0 --port 8000\n' > deploy_bundle/Procfile

      - echo "Creating uploads directory"
      - mkdir -p deploy_bundle/uploads

      - echo "Copying optional Elastic Beanstalk config folders if present"
      - if [ -d ".ebextensions" ]; then cp -r .ebextensions deploy_bundle/.ebextensions; fi
      - if [ -d ".platform" ]; then cp -r .platform deploy_bundle/.platform; fi

  post_build:
    commands:
      - echo "Build completed successfully"

artifacts:
  base-directory: deploy_bundle
  files:
    - '**/*'
